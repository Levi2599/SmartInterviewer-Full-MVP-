<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmartInterviewer AI – Interview Prep Platform</title>
    <meta name="description" content="AI-powered interview preparation platform with STAR methodology coaching, question banks, and progress analytics." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        font-size: 16px;
        scroll-behavior: smooth;
      }
      body {
        font-family: 'Outfit', 'Inter', system-ui, -apple-system, sans-serif;
        background-color: #f8fafc;
        color: #334155;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      button {
        font-family: inherit;
        cursor: pointer;
      }
      input, textarea, select {
        font-family: inherit;
      }
      a {
        text-decoration: none;
        color: inherit;
      }
      /* Smooth transitions for interactive elements */
      button, a, input, textarea, select {
        transition: all 0.15s ease;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/client/src/main.jsx"></script>
  </body>
</html>
